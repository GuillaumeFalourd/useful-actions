name: Codex Action

on:
  workflow_dispatch:

jobs:
  codex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Codex
        id: codex
        uses: icoretech/codex-action@v0
        with:
          prompt: "Summarize the repository structure"
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      - name: Print result
        run: echo "${{ steps.codex.outputs.result }}"
